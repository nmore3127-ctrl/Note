<!DOCTYPE html>
<html lang="bn">
<head>
 <meta charset="UTF-8">

• <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Smart Link Notepad</title>
 <style>
 body { font-family: sans-serif; background: #121212; color: #fff; padding: 
20px; margin: 0; }
 .container { max-width: 500px; margin: 0 auto; }
 h2 { color: #1877f2; text-align: center; }
 textarea { width: 100%; height: 120px; background: #222; color: #fff; border: 
1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 
14px; }
 button { width: 100%; background: #1877f2; color: white; border: none; 
padding: 12px; margin-top: 10px; border-radius: 8px; font-size: 16px; cursor: pointer; 
font-weight: bold; }
 button:hover { background: #1565c0; }
 .list-container { margin-top: 25px; background: #1e1e1e; padding: 15px; 
border-radius: 8px; border: 1px solid #333; }
 ol { padding-left: 20px; margin: 0; }
 li { margin-bottom: 12px; font-size: 15px; color: #e0e0e0; }
 a { color: #4dadff; text-decoration: none; word-break: break-all; font-weight: 
500; }
 a:hover { text-decoration: underline; }
 </style>
</head>
<body>
 <div class="container">
 <h2>Smart Link Notepad</h2>
 <textarea id="rawLinks" placeholder="এখো=ন আপনোর Ǭলংকগু=লো কমো (,) 7দ=য় ǂপস্ট করুন..."></
textarea>
 <button onclick="processLinks()">ফেরম্যোট এবং ǂসভে করুন</button>
 <div class="list-container">
 <h3 style="margin-top:0; color:#1877f2;">সংরǬক্ষিত Ǭলংকসমূহি:</h3>
 <ol id="formattedList"></ol>
 </div>
 </div>
 <script>
 window.onload = function() { loadSavedLinks(); };
 function processLinks() {
 let input = document.getElementById('rawLinks').value;
 if(!input.trim()) return alert('দয়ো ক=র 7কছু Ǭলংক ǂপস্ট করুন!');
 let linksArray = input.split(',');
 let listHtml = '';
 let savedArray = [];
 linksArray.forEach((link) => { let cleanLink = link.trim();
 if(cleanLink) {
 let deepLink = cleanLink.replace('https://www.facebook.com/', 
'fb://facewebmodal/f?href=https://www.facebook.com/');
 listHtml += `<li><a href="${deepLink}" target="_blank">$
{cleanLink}</a></li>`;
 savedArray.push({original: cleanLink, native: deepLink});
 }
 });
 document.getElementById('formattedList').innerHTML = listHtml;
 localStorage.setItem('saved_reels', JSON.stringify(savedArray));
 document.getElementById('rawLinks').value = '';
 }
 function loadSavedLinks() {
 let saved = localStorage.getItem('saved_reels');
 if(saved) {
 let savedArray = JSON.parse(saved);
 let listHtml = '';
 savedArray.forEach((item) => {
 listHtml += `<li><a href="${item.native}" target="_blank">$
{item.original}</a></li>`;
 });
 document.getElementById('formattedList').innerHTML = listHtml;
 }
 }
 </script>
</body>
</html>
