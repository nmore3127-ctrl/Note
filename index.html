<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Reels Notepad</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-2:#1e2229;
    --border:#2a2f3a;
    --accent:#1877f2;
    --accent-hover:#3b8ef2;
    --text:#e8eaed;
    --text-dim:#9aa0a8;
    --danger:#e0245e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:16px;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  header{
    display:flex;
    flex-direction:column;
    gap:4px;
    padding:4px 2px;
  }
  header h1{
    font-size:1.25rem;
    margin:0;
  }
  header p{
    margin:0;
    color:var(--text-dim);
    font-size:0.85rem;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
  }
  textarea{
    width:100%;
    min-height:150px;
    resize:vertical;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    font-size:1rem;
    line-height:1.4;
    font-family:inherit;
  }
  textarea:focus{
    outline:none;
    border-color:var(--accent);
  }
  .btn-row{
    display:flex;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
  }
  button{
    flex:1;
    min-width:120px;
    padding:12px 16px;
    border-radius:10px;
    border:none;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
  }
  button:active{
    transform:scale(0.98);
  }
  #saveBtn{
    background:var(--accent);
    color:#fff;
  }
  #saveBtn:hover{ background:var(--accent-hover); }
  #clearBtn{
    background:transparent;
    color:var(--danger);
    border:1px solid var(--border);
    flex:0 0 auto;
    min-width:90px;
  }
  #clearBtn:hover{
    border-color:var(--danger);
  }
  .status{
    font-size:0.8rem;
    color:var(--text-dim);
    min-height:1.1em;
    margin-top:8px;
  }
  .list-card h2{
    font-size:1rem;
    margin:0 0 10px 0;
    color:var(--text-dim);
    font-weight:600;
  }
  ol{
    margin:0;
    padding-left:22px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  ol li{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    word-break:break-all;
  }
  ol li a{
    color:var(--accent-hover);
    text-decoration:none;
    font-size:0.9rem;
  }
  ol li a:hover{
    text-decoration:underline;
  }
  .empty-state{
    color:var(--text-dim);
    font-size:0.9rem;
    text-align:center;
    padding:20px 0;
  }
  footer{
    text-align:center;
    color:var(--text-dim);
    font-size:0.75rem;
    padding:8px 0 20px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>🎬 Reels Notepad</h1>
    <p>Paste comma-separated Facebook Reels links, format them into a numbered list of native app links, and they'll auto-save.</p>
  </header>

  <div class="card">
    <textarea id="inputArea" placeholder="Paste URLs separated by commas, e.g.&#10;https://www.facebook.com/reel/123456, https://www.facebook.com/reel/789012"></textarea>
    <div class="btn-row">
      <button id="saveBtn">Format &amp; Save</button>
      <button id="clearBtn">Clear All</button>
    </div>
    <div class="status" id="statusMsg"></div>
  </div>

  <div class="card list-card">
    <h2>Saved Links</h2>
    <div id="listContainer">
      <div class="empty-state">No links saved yet.</div>
    </div>
  </div>

  <footer>Links use Android intent:// URLs to open each Reel directly in Facebook Lite, with a browser fallback if it's not installed.</footer>
</div>

<script>
(function(){
  const STORAGE_KEY = 'reelsNotepad.savedUrls';
  const inputArea = document.getElementById('inputArea');
  const saveBtn = document.getElementById('saveBtn');
  const clearBtn = document.getElementById('clearBtn');
  const listContainer = document.getElementById('listContainer');
  const statusMsg = document.getElementById('statusMsg');

  // Normalize a raw string into a proper https:// web URL
  function toCleanWebUrl(url){
    let clean = url.trim();
    if(!/^https?:\/\//i.test(clean)){
      clean = 'https://' + clean.replace(/^\/\//,'');
    }
    return clean;
  }

  // Build an Android intent:// deep link that forces the link to open
  // inside the Facebook Lite app (com.facebook.lite) for that specific
  // Reel/Post, falling back to the normal web URL if Lite isn't installed.
  function toFacebookLiteIntentLink(url){
    const webUrl = toCleanWebUrl(url);
    let hostAndPath;
    try{
      const u = new URL(webUrl);
      // intent:// expects the scheme stripped off, e.g. facebook.com/share/r/XXXX
      hostAndPath = u.host + u.pathname + u.search;
    }catch(e){
      // If parsing fails, strip the protocol manually as a fallback
      hostAndPath = webUrl.replace(/^https?:\/\//i, '');
    }
    const fallback = encodeURIComponent(webUrl);
    return 'intent://' + hostAndPath +
      '#Intent;package=com.facebook.lite;scheme=https;' +
      'S.browser_fallback_url=' + fallback + ';end';
  }

  function parseInputToUrls(raw){
    return raw
      .split(',')
      .map(s => s.trim())
      .filter(s => s.length > 0);
  }

  function renderList(urls){
    if(!urls || urls.length === 0){
      listContainer.innerHTML = '<div class="empty-state">No links saved yet.</div>';
      return;
    }
    const ol = document.createElement('ol');
    urls.forEach(url => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = toFacebookLiteIntentLink(url);
      a.textContent = url;
      a.rel = 'noopener noreferrer';
      // Keep the plain web URL handy too (used as the intent's own fallback,
      // and available here in case you want a manual "open in browser" option)
      a.dataset.webUrl = toCleanWebUrl(url);
      li.appendChild(a);
      ol.appendChild(li);
    });
    listContainer.innerHTML = '';
    listContainer.appendChild(ol);
  }

  function loadSaved(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){
      console.error('Failed to load saved urls', e);
      return [];
    }
  }

  function saveUrls(urls){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(urls));
      return true;
    }catch(e){
      console.error('Failed to save urls', e);
      return false;
    }
  }

  function showStatus(msg, isError){
    statusMsg.textContent = msg;
    statusMsg.style.color = isError ? '#e0245e' : '#9aa0a8';
    if(msg){
      setTimeout(() => {
        if(statusMsg.textContent === msg) statusMsg.textContent = '';
      }, 3000);
    }
  }

  saveBtn.addEventListener('click', () => {
    const raw = inputArea.value;
    const urls = parseInputToUrls(raw);
    if(urls.length === 0){
      showStatus('Please paste at least one URL first.', true);
      return;
    }
    const ok = saveUrls(urls);
    renderList(urls);
    if(ok){
      showStatus(`Saved ${urls.length} link${urls.length !== 1 ? 's' : ''}.`, false);
    }else{
      showStatus('Could not save to local storage.', true);
    }
  });

  clearBtn.addEventListener('click', () => {
    if(!confirm('Clear the textarea and all saved links?')) return;
    inputArea.value = '';
    localStorage.removeItem(STORAGE_KEY);
    renderList([]);
    showStatus('Cleared.', false);
  });

  // Restore on page load
  window.addEventListener('DOMContentLoaded', () => {
    const saved = loadSaved();
    if(saved.length){
      inputArea.value = saved.join(', ');
      renderList(saved);
    }
  });
})();
</script>
</body>
</html>
